; =============================================================================
; Inventory — OCI 2-node k3s 클러스터
; =============================================================================
; 실제 배포 시 ansible_host을 각 노드의 접근 가능한 IP로 교체한다.
;   - 같은 VCN 내부에서 실행하면 사설 IP (10.0.1.x)
;   - 외부에서 실행하면 공인 IP
; =============================================================================

[k3s_server]
node1 ansible_host=10.0.1.113

[k3s_agent]
node2 ansible_host=10.0.1.69

[k3s_cluster:children]
k3s_server
k3s_agent

[k3s_cluster:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/oci_k3s.pem
ansible_python_interpreter=/usr/bin/python3
