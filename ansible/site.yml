# =============================================================================
# site.yml — 단일 진입점 ("딸깍" 부트스트랩)
# =============================================================================
# 실행:
#   cd ansible
#   ansible-playbook site.yml --ask-vault-pass
#
# 책임 경계 (docs/adr/0004-ansible-argocd-boundary.md):
#   - 이 플레이북은 Day-0 부트스트랩만 담당한다.
#   - 플랫폼 컴포넌트(12개)는 ArgoCD가 Day-1 이후 GitOps로 동기화한다.
# =============================================================================

# -----------------------------------------------------------------------------
# Play 1: 전체 노드 OS 준비
# -----------------------------------------------------------------------------
- name: Preflight — 모든 노드 OS 준비
  hosts: k3s_cluster
  become: true
  roles:
    - preflight

# -----------------------------------------------------------------------------
# Play 2: (airgap 전용) 컨테이너 레지스트리 미러 설정
# -----------------------------------------------------------------------------
- name: Registries mirror — airgap 레지스트리 리라이트
  hosts: k3s_cluster
  become: true
  roles:
    - role: registries_mirror
      when: deployment_mode == 'airgap'

# -----------------------------------------------------------------------------
# Play 3: k3s server 설치
# -----------------------------------------------------------------------------
- name: k3s server 설치
  hosts: k3s_server
  become: true
  roles:
    - role: k3s
      k3s_role: server

# -----------------------------------------------------------------------------
# Play 4: k3s agent join
# -----------------------------------------------------------------------------
- name: k3s agent join
  hosts: k3s_agent
  become: true
  roles:
    - role: k3s
      k3s_role: agent

# -----------------------------------------------------------------------------
# Play 5: ArgoCD 설치 + 시크릿 시드 + 플랫폼 부트스트랩 (server 노드에서 kubectl)
# -----------------------------------------------------------------------------
- name: ArgoCD 설치 및 플랫폼 부트스트랩
  hosts: k3s_server
  become: true
  roles:
    - argocd
    - secrets_seed
    - platform_bootstrap
