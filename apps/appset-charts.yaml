# =============================================================================
# Helm 차트 컴포넌트 ApplicationSet
# =============================================================================
# Helm 차트로 배포되는 7개 컴포넌트를 단일 template으로 관리한다.
#
# 설계 메모(중요): ArgoCD ApplicationSet template은 Helm처럼 raw-text를 먼저
# 렌더링하지 않는다. 유효한 YAML이어야 하고 goTemplate은 "문자열 값"만 치환한다.
# 따라서 source vs sources처럼 구조가 다른 분기는 한 template에 담을 수 없다.
# → git manifest 앱은 apps/appset-manifests.yaml로 분리했다 (ADR-0002).
#
# syncOption은 모든 차트에 ServerSideApply를 적용한다. 대형 CRD(kube-prometheus,
# loki 등)의 last-applied annotation 크기 한계를 피하고 template을 균일하게 유지한다.
#
# 각 element 필드: name / wave / chartRepo / chart / targetRevision / valuesFile / namespace
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-charts
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-9"
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          # Wave 0: cert-manager (CRD + webhook) — PKI보다 먼저 Healthy 되어야 함
          - name: platform-system-cert-manager
            wave: "0"
            chartRepo: https://charts.jetstack.io
            chart: cert-manager
            targetRevision: "v1.17.0"
            valuesFile: helm-values/system/cert-manager-values.yaml
            namespace: cert-manager

          # Wave 1: 공용 데이터베이스 (chart가 자체 PVC 생성 → 사전 PVC 데드락 회피)
          - name: platform-db-postgres
            wave: "1"
            chartRepo: https://charts.bitnami.com/bitnami
            chart: postgresql
            targetRevision: "18.5.19"
            valuesFile: helm-values/database/postgres-values.yaml
            namespace: platform-db

          - name: platform-db-redis
            wave: "1"
            chartRepo: https://charts.bitnami.com/bitnami
            chart: redis
            targetRevision: "25.3.11"
            valuesFile: helm-values/database/redis-values.yaml
            namespace: platform-db

          # Wave 2: IAM (Keycloak은 외부 PostgreSQL 의존)
          - name: platform-iam-keycloak
            wave: "2"
            chartRepo: https://charts.bitnami.com/bitnami
            chart: keycloak
            targetRevision: "25.2.0"
            valuesFile: helm-values/iam/keycloak-values-dev.yaml
            namespace: platform-iam

          # Wave 3: Metrics
          - name: platform-monitoring-prometheus
            wave: "3"
            chartRepo: https://prometheus-community.github.io/helm-charts
            chart: kube-prometheus-stack
            targetRevision: "83.6.0"
            valuesFile: helm-values/monitoring/kube-prometheus-stack-values.yaml
            namespace: platform-monitoring

          # Wave 4: Log store (Loki는 Alloy 이전)
          - name: platform-monitoring-loki
            wave: "4"
            chartRepo: https://grafana-community.github.io/helm-charts
            chart: loki
            targetRevision: "6.46.0"
            valuesFile: helm-values/monitoring/loki-values.yaml
            namespace: platform-monitoring

          # Wave 5: Log collector (Loki endpoint 이후)
          - name: platform-monitoring-alloy
            wave: "5"
            chartRepo: https://grafana.github.io/helm-charts
            chart: alloy
            targetRevision: "1.7.0"
            valuesFile: helm-values/monitoring/alloy-values.yaml
            namespace: platform-monitoring

  template:
    metadata:
      name: "{{ .name }}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{ .wave }}"
    spec:
      project: platform-infra
      sources:
        - repoURL: "{{ .chartRepo }}"
          chart: "{{ .chart }}"
          targetRevision: "{{ .targetRevision }}"
          helm:
            valueFiles:
              - "$values/{{ .valuesFile }}"
        - repoURL: "https://github.com/yhsk9200/platform-infra.git"
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
