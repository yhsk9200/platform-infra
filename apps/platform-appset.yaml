# =============================================================================
# Platform Infrastructure ApplicationSet
# =============================================================================
# List Generator를 사용해 12개 child Application을 단일 파일로 관리한다.
#
# Harbor는 chart 특성상 ignoreDifferences 설정이 필요해 별도 Application으로
# 분리했다 (apps/platform-registry-harbor.yaml 참조, ADR 0002 참조).
#
# 각 element 필드:
#   name           — ArgoCD Application 이름
#   wave           — argocd.argoproj.io/sync-wave 어노테이션 값 (문자열)
#   gitPath        — Git manifest 경로 (설정 시 source 단일 소스로 배포)
#   chartRepo      — Helm chart 레포지토리 URL (gitPath 없을 때 사용)
#   chart          — Helm chart 이름
#   targetRevision — Helm chart 버전
#   valuesFile     — helm-values/ 상대 경로
#   namespace      — destination 네임스페이스 (git app은 각 manifest 참조)
#   serverSideApply — ServerSideApply syncOption 활성화 여부
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-infra
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-9"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          # ---------------------------------------------------------------
          # Wave -3: Namespace 사전 생성
          # ---------------------------------------------------------------
          - name: platform-infra-namespaces
            wave: "-3"
            gitPath: manifests/namespaces
            namespace: ""
            serverSideApply: false

          # ---------------------------------------------------------------
          # Wave -2: Sealed Secrets Controller
          # ---------------------------------------------------------------
          - name: platform-system-sealed-secrets
            wave: "-2"
            chartRepo: https://bitnami-labs.github.io/sealed-secrets
            chart: sealed-secrets
            targetRevision: "2.18.4"
            valuesFile: helm-values/system/sealed-secrets-values.yaml
            namespace: platform-system
            serverSideApply: false

          # ---------------------------------------------------------------
          # Wave -1: SealedSecret 리소스 (controller 이후 배포)
          # ---------------------------------------------------------------
          - name: platform-infra-secrets
            wave: "-1"
            gitPath: manifests/security
            namespace: ""
            serverSideApply: false

          # ---------------------------------------------------------------
          # Wave 0: 기반 스토리지 / PKI / cert-manager
          # ---------------------------------------------------------------
          - name: platform-infra-storage
            wave: "0"
            gitPath: manifests/storage
            namespace: ""
            serverSideApply: false

          - name: platform-infra-pki
            wave: "0"
            gitPath: manifests/pki
            namespace: ""
            serverSideApply: false

          - name: platform-system-cert-manager
            wave: "0"
            chartRepo: https://charts.jetstack.io
            chart: cert-manager
            targetRevision: "v1.17.0"
            valuesFile: helm-values/system/cert-manager-values.yaml
            namespace: cert-manager
            serverSideApply: false

          # ---------------------------------------------------------------
          # Wave 1: 공용 데이터베이스
          # ---------------------------------------------------------------
          - name: platform-db-postgres
            wave: "1"
            chartRepo: https://charts.bitnami.com/bitnami
            chart: postgresql
            targetRevision: "18.5.19"
            valuesFile: helm-values/database/postgres-values.yaml
            namespace: platform-db
            serverSideApply: false

          - name: platform-db-redis
            wave: "1"
            chartRepo: https://charts.bitnami.com/bitnami
            chart: redis
            targetRevision: "25.3.11"
            valuesFile: helm-values/database/redis-values.yaml
            namespace: platform-db
            serverSideApply: false

          # ---------------------------------------------------------------
          # Wave 2: IAM (Keycloak은 외부 DB 의존)
          # ---------------------------------------------------------------
          - name: platform-iam-keycloak
            wave: "2"
            chartRepo: https://charts.bitnami.com/bitnami
            chart: keycloak
            targetRevision: "25.2.0"
            valuesFile: helm-values/iam/keycloak-values-dev.yaml
            namespace: platform-iam
            serverSideApply: false

          # ---------------------------------------------------------------
          # Wave 3: Metrics (kube-prometheus-stack은 CRD 크기로 SSA 필요)
          # ---------------------------------------------------------------
          - name: platform-monitoring-prometheus
            wave: "3"
            chartRepo: https://prometheus-community.github.io/helm-charts
            chart: kube-prometheus-stack
            targetRevision: "83.6.0"
            valuesFile: helm-values/monitoring/kube-prometheus-stack-values.yaml
            namespace: platform-monitoring
            serverSideApply: true

          # ---------------------------------------------------------------
          # Wave 4: Log store (Loki는 Alloy 이전에 배포)
          # ---------------------------------------------------------------
          - name: platform-monitoring-loki
            wave: "4"
            chartRepo: https://grafana-community.github.io/helm-charts
            chart: loki
            targetRevision: "6.46.0"
            valuesFile: helm-values/monitoring/loki-values.yaml
            namespace: platform-monitoring
            serverSideApply: true

          # ---------------------------------------------------------------
          # Wave 5: Log collector (Loki endpoint 존재 후 배포)
          # ---------------------------------------------------------------
          - name: platform-monitoring-alloy
            wave: "5"
            chartRepo: https://grafana.github.io/helm-charts
            chart: alloy
            targetRevision: "1.7.0"
            valuesFile: helm-values/monitoring/alloy-values.yaml
            namespace: platform-monitoring
            serverSideApply: true

  template:
    metadata:
      name: "{{ .name }}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{ .wave }}"
    spec:
      project: platform-infra

      # Git manifest app과 Helm app을 gitPath 유무로 분기한다.
      {{- if .gitPath }}
      source:
        repoURL: "https://github.com/yhsk9200/platform-infra.git"
        targetRevision: main
        path: "{{ .gitPath }}"
      {{- else }}
      sources:
        - repoURL: "{{ .chartRepo }}"
          chart: "{{ .chart }}"
          targetRevision: "{{ .targetRevision }}"
          helm:
            valueFiles:
              - "$values/{{ .valuesFile }}"
        - repoURL: "https://github.com/yhsk9200/platform-infra.git"
          targetRevision: main
          ref: values
      {{- end }}

      destination:
        server: https://kubernetes.default.svc
        {{- if .namespace }}
        namespace: "{{ .namespace }}"
        {{- end }}

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          {{- if .serverSideApply }}
          - ServerSideApply=true
          {{- end }}
