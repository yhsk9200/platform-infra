apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-root-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/yhsk9200/platform-infra.git"
    targetRevision: main
    path: apps
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
