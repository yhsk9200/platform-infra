# =============================================================================
# Keycloak values — dev/internal 환경 (도메인/TLS 미확정)
# =============================================================================
# - 공개 도메인 없이 운영. 관리자 콘솔은 kubectl port-forward로 접근
# - 도메인/TLS 확정 후 keycloak-values-prod.yaml 전환
# =============================================================================

global:
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: bitnamilegacy/keycloak
  tag: 26.3.3-debian-12-r0

auth:
  adminUser: admin
  existingSecret: keycloak-admin-secret
  passwordSecretKey: admin-password

postgresql:
  enabled: false

externalDatabase:
  host: platform-db-postgres-postgresql.platform-db.svc.cluster.local
  port: 5432
  user: keycloak_admin
  database: keycloak_db
  existingSecret: keycloak-db-secret
  existingSecretPasswordKey: keycloak-password

production: false
proxyHeaders: ""
hostnameStrict: false
httpEnabled: true

ingress:
  enabled: false

automountServiceAccountToken: false

serviceAccount:
  create: true
  automountServiceAccountToken: false

replicaCount: 1

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

logging:
  output: default
  level: INFO

metrics:
  enabled: false
  serviceMonitor:
    enabled: false

keycloakConfigCli:
  enabled: false

networkPolicy:
  enabled: true
  allowExternal: true
  allowExternalEgress: true
