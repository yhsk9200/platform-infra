# =============================================================================
# Keycloak values — production 환경 (도메인/TLS 확정 후 사용)
# =============================================================================
# 현재 ArgoCD Application은 keycloak-values-dev.yaml을 참조한다.
# 도메인, TLS, OIDC redirect URI 확정 후 이 파일로 교체한다.
# =============================================================================

global:
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: bitnamilegacy/keycloak
  tag: 26.3.3-debian-12-r0

auth:
  adminUser: admin
  existingSecret: keycloak-admin-secret
  passwordSecretKey: admin-password

postgresql:
  enabled: false

externalDatabase:
  host: platform-db-postgres-postgresql.platform-db.svc.cluster.local
  port: 5432
  user: keycloak_admin
  database: keycloak_db
  existingSecret: keycloak-db-secret
  existingSecretPasswordKey: keycloak-password

production: true
proxyHeaders: xforwarded
hostnameStrict: true
httpEnabled: true

ingress:
  enabled: true
  ingressClassName: traefik
  hostname: auth.example.com   # TODO: 실제 도메인으로 교체
  tls: true
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: platform-ca

automountServiceAccountToken: false

serviceAccount:
  create: true
  automountServiceAccountToken: false

replicaCount: 1

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

logging:
  output: default
  level: INFO

metrics:
  enabled: false
  serviceMonitor:
    enabled: false

keycloakConfigCli:
  enabled: false

networkPolicy:
  enabled: true
  allowExternal: true
  allowExternalEgress: true
