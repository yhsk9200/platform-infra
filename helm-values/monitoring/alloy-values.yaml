# =============================================================================
# Grafana Alloy values — Kubernetes API 기반 로그 수집 (Deployment 방식)
# =============================================================================
# DaemonSet 대신 Deployment를 사용해 hostPath 마운트와 privileged 권한을 피한다.
# 트레이드오프: 노드 수준 장애에 덜 견고하나 권한 요구가 낮아 운영이 가볍다.
# =============================================================================

controller:
  type: deployment
  replicas: 1

alloy:
  enableReporting: false
  stabilityLevel: generally-available
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  configMap:
    create: true
    content: |
      logging {
        level  = "info"
        format = "logfmt"
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          action        = "replace"
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          action        = "replace"
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          action        = "replace"
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          action        = "replace"
          target_label  = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
          action        = "replace"
          target_label  = "job"
          separator     = "/"
          replacement   = "$1"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_id"]
          action        = "replace"
          target_label  = "container_runtime"
          regex         = `^(\S+):\/\/.+$`
          replacement   = "$1"
        }
      }

      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.pod_logs.receiver]
      }

      loki.process "pod_logs" {
        stage.static_labels {
          values = {
            cluster = "platform-infra",
          }
        }
        forward_to = [loki.write.loki.receiver]
      }

      loki.source.kubernetes_events "cluster_events" {
        job_name   = "integrations/kubernetes/eventhandler"
        log_format = "logfmt"
        forward_to = [loki.process.cluster_events.receiver]
      }

      loki.process "cluster_events" {
        stage.static_labels {
          values = {
            cluster = "platform-infra",
          }
        }
        stage.labels {
          values = {
            kubernetes_cluster_events = "job",
          }
        }
        forward_to = [loki.write.loki.receiver]
      }

      loki.write "loki" {
        endpoint {
          url = "http://platform-monitoring-loki-gateway.platform-monitoring.svc.cluster.local/loki/api/v1/push"
        }
      }

serviceMonitor:
  enabled: true
