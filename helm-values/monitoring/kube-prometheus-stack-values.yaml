# =============================================================================
# kube-prometheus-stack values — OCI ARM64 k3s 환경
# =============================================================================
# 스토리지: Node1 local-path (Prometheus + Grafana + Alertmanager 모두 Node1)
# 보존 기간: 15일 / 할당 용량: Prometheus 30GB, Grafana 10GB, Alertmanager 5GB
# =============================================================================

grafana:
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  persistence:
    enabled: true
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 10Gi

  ingress:
    enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

  additionalDataSources:
    - name: Loki
      uid: loki
      type: loki
      access: proxy
      url: http://platform-monitoring-loki-gateway.platform-monitoring.svc.cluster.local
      editable: true
      isDefault: false
      jsonData:
        manageAlerts: false

prometheus:
  prometheusSpec:
    retention: 15d

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 30Gi

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi

    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

defaultRules:
  create: true
  rules:
    # k3s는 etcd/scheduler/controller-manager가 기본 미노출이므로 비활성화
    etcd: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false

kubeProxy:
  enabled: false
