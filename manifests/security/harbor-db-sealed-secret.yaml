# Secret 키: password (harbor_admin DB 비밀번호)
# postgres-db-secret의 harbor-password와 동일한 값을 사용해야 한다.
# 재생성:
#   kubectl create secret generic harbor-db-secret \
#     --namespace=platform-registry \
#     --from-literal=password='<SAME_PW_AS_POSTGRES_HARBOR_PASSWORD>' \
#     --dry-run=client -o yaml | \
#     kubeseal --cert pub-cert.pem --format=yaml \
#     > manifests/security/harbor-db-sealed-secret.yaml

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: harbor-db-secret
  namespace: platform-registry
spec:
  encryptedData:
    password: PLACEHOLDER_RESEAL_REQUIRED
  template:
    metadata:
      name: harbor-db-secret
      namespace: platform-registry
