# Secret 키: admin-password (Harbor 관리자 비밀번호)
# 재생성:
#   kubectl create secret generic harbor-admin-secret \
#     --namespace=platform-registry \
#     --from-literal=admin-password='<PW>' \
#     --dry-run=client -o yaml | \
#     kubeseal --cert pub-cert.pem --format=yaml \
#     > manifests/security/harbor-sealed-secret.yaml

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: harbor-admin-secret
  namespace: platform-registry
spec:
  encryptedData:
    admin-password: PLACEHOLDER_RESEAL_REQUIRED
  template:
    metadata:
      name: harbor-admin-secret
      namespace: platform-registry
---
# Secret 키: secretKey (Harbor core encryption key, 16자 이상 랜덤 문자열)
# 재생성:
#   kubectl create secret generic harbor-core-secret \
#     --namespace=platform-registry \
#     --from-literal=secretKey='<RANDOM_16CHAR_KEY>' \
#     --dry-run=client -o yaml | \
#     kubeseal --cert pub-cert.pem --format=yaml \
#     >> manifests/security/harbor-sealed-secret.yaml

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: harbor-core-secret
  namespace: platform-registry
spec:
  encryptedData:
    secretKey: PLACEHOLDER_RESEAL_REQUIRED
  template:
    metadata:
      name: harbor-core-secret
      namespace: platform-registry
