# Secret 키: keycloak-password
# postgres-db-secret의 keycloak-password와 동일한 값을 사용해야 한다.
# 재생성:
#   kubectl create secret generic keycloak-db-secret \
#     --namespace=platform-iam \
#     --from-literal=keycloak-password='<SAME_PW_AS_POSTGRES_KEYCLOAK_PASSWORD>' \
#     --dry-run=client -o yaml | \
#     kubeseal --cert pub-cert.pem --format=yaml \
#     > manifests/security/keycloak-db-sealed-secret.yaml

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: keycloak-db-secret
  namespace: platform-iam
spec:
  encryptedData:
    keycloak-password: PLACEHOLDER_RESEAL_REQUIRED
  template:
    metadata:
      name: keycloak-db-secret
      namespace: platform-iam
