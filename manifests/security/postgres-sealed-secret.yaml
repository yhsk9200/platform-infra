# =============================================================================
# PostgreSQL SealedSecret — PLACEHOLDER
# =============================================================================
# 이 파일의 암호문은 배포 전 반드시 재생성해야 합니다.
# 대상 클러스터의 sealed-secrets-controller 공개키로 다시 암호화하지 않으면
# Secret 복호화에 실패하여 PostgreSQL, Keycloak, Harbor가 모두 기동 불가입니다.
#
# Secret 키 구성:
#   - postgres-password : PostgreSQL superuser 비밀번호
#   - keycloak-password : keycloak_admin 유저 비밀번호
#                         (keycloak-db-secret의 keycloak-password와 동일 값)
#   - harbor-password   : harbor_admin 유저 비밀번호
#                         (harbor-db-secret의 password와 동일 값)
#
# 재생성 방법 (docs/porting-guide.md 참조):
#   1. kubeseal --fetch-cert ... > pub-cert.pem
#   2. kubectl create secret generic postgres-db-secret \
#        --namespace=platform-db \
#        --from-literal=postgres-password='<PW>' \
#        --from-literal=keycloak-password='<PW>' \
#        --from-literal=harbor-password='<PW>' \
#        --dry-run=client -o yaml | \
#        kubeseal --cert pub-cert.pem --format=yaml \
#        > manifests/security/postgres-sealed-secret.yaml
# =============================================================================

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgres-db-secret
  namespace: platform-db
spec:
  encryptedData:
    harbor-password: PLACEHOLDER_RESEAL_REQUIRED
    keycloak-password: PLACEHOLDER_RESEAL_REQUIRED
    postgres-password: PLACEHOLDER_RESEAL_REQUIRED
  template:
    metadata:
      name: postgres-db-secret
      namespace: platform-db
