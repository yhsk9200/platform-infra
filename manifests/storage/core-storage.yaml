# =============================================================================
# Core PVC — PostgreSQL, Redis
# =============================================================================
# local-path StorageClass는 PVC가 처음 Pod에 마운트될 때 노드에 바인딩된다.
# 이후 해당 노드에서만 사용 가능하므로 StatefulSet nodeAffinity 또는
# 동일 노드에 Pod가 스케줄되도록 taint/toleration을 고려한다.
#
# 스토리지 배치 전략 (docs/porting-guide.md 참조):
#   Node1: postgres-pvc, redis-pvc, Prometheus, Grafana, Alertmanager
#   Node2: Loki, Harbor (chart 내부 PVC)
# =============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: platform-db
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: platform-db
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
